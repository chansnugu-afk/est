<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeTable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

.app{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:100px;
}

.top{
    width:100%;
    padding:45px 20px;
    text-align:center;
    transition:0.5s;
}

.danger{
    background:linear-gradient(135deg,#5a0000,#cf0000);
}

.safe{
    background:linear-gradient(135deg,#006b2d,#00b85c);
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.status{
    font-size:26px;
    margin-top:15px;
}

.device{
    margin-top:12px;
    opacity:0.9;
    font-size:18px;
}

.connectBtn{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:20px;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.page{
    display:none;
    width:100%;
    padding:25px;
}

.active{
    display:block;
}

.card{
    background:#1d1d1d;
    border-radius:20px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card h2{
    margin-bottom:15px;
}

.warning{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#ff3b3b;
    font-size:20px;
    display:none;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

.bottomNav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:90px;
    background:#181818;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:2px solid #333;
}

.navBtn{
    color:white;
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    transition:0.3s;
}

.icon{
    font-size:28px;
}

.navText{
    font-size:14px;
}

.activeNav{
    color:#b266ff;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

.simulateBtn{
    margin-top:15px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#00b85c;
    color:white;
    font-size:18px;
    cursor:pointer;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

.infoBox{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="app">

    <!-- 상단 -->
    <div class="top danger" id="topArea">

        <div class="title">SafeTable</div>

        <div class="status" id="statusText">
            ⚠ 분실 위험 있음
        </div>

        <div class="device" id="deviceText">
            현재 연결된 기기 없음
        </div>

        <button class="connectBtn" onclick="connectDevice()">
            기기 연결하기
        </button>

    </div>

    <!-- 홈 -->
    <div class="page active" id="homePage">

        <div class="card">

            <h2>현재 상태</h2>

            <p>
                테이블 위 물건이 일정 시간 이상 감지되면
                사용자에게 즉시 경고 알림을 보냅니다.
            </p>

            <div class="infoBox">

                ⏱ 총 연결 시간 :
                <span id="connectedTime">0분 0초</span>

                <br><br>

                📡 현재 상태 :
                <span id="liveState">연결 대기중</span>

            </div>

            <div class="warning" id="warningBox">
                🚨 분실물 감지됨! 물건을 확인하세요.
            </div>

        </div>

    </div>

    <!-- 설정 -->
    <div class="page" id="settingPage">

        <div class="card">

            <h2>설정</h2>

            <label>사용자 이름</label>
            <input type="text" placeholder="사용자 이름 입력">

            <label>기기 이름</label>
            <input type="text" placeholder="예 : Table Sensor #03">

            <label>압력 감지 시간 (초)</label>
            <input type="number" id="timeLimit" value="10">

            <label>알림 방식</label>
            <input type="text" placeholder="앱 알림">

            <label>Wi-Fi 상태</label>
            <input type="text" placeholder="연결됨">

        </div>

    </div>

    <!-- 그래프 -->
    <div class="page" id="graphPage">

        <div class="card">

            <h2>압력값 그래프</h2>

            <canvas id="pressureChart"></canvas>

            <button class="simulateBtn" onclick="startSimulation()">
                압력 감지 시작하기
            </button>

        </div>

    </div>

</div>

<!-- 하단 네비게이션 -->
<div class="bottomNav">

    <button class="navBtn activeNav"
        onclick="showPage('homePage', this)">

        <div class="icon">🏠</div>
        <div class="navText">홈</div>

    </button>

    <button class="navBtn"
        onclick="showPage('settingPage', this)">

        <div class="icon">⚙️</div>
        <div class="navText">설정</div>

    </button>

    <button class="navBtn"
        onclick="showPage('graphPage', this)">

        <div class="icon">📈</div>
        <div class="navText">압력값 그래프</div>

    </button>

</div>

<script>

let connected = false;
let simulationRunning = false;
let pressureValue = 0;
let sameTime = 0;
let connectSeconds = 0;

/* 페이지 이동 */

function showPage(pageId, element){

    let pages = document.querySelectorAll(".page");

    pages.forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById(pageId)
        .classList.add("active");

    let navs = document.querySelectorAll(".navBtn");

    navs.forEach(nav=>{
        nav.classList.remove("activeNav");
    });

    element.classList.add("activeNav");

}

/* 기기 연결 */

function connectDevice(){

    connected = true;

    document.getElementById("topArea")
        .classList.remove("danger");

    document.getElementById("topArea")
        .classList.add("safe");

    document.getElementById("statusText")
        .innerHTML = "✔ 기기 연결됨";

    document.getElementById("deviceText")
        .innerHTML =
        "연결된 기기 : Table Sensor #03";

    document.getElementById("liveState")
        .innerHTML = "정상 연결됨";

}

/* 연결 시간 */

setInterval(()=>{

    if(connected){

        connectSeconds++;

        let min =
            Math.floor(connectSeconds / 60);

        let sec =
            connectSeconds % 60;

        document.getElementById("connectedTime")
            .innerHTML =
            min + "분 " + sec + "초";

    }

},1000);

/* 그래프 */

const ctx =
document.getElementById('pressureChart');

const pressureChart = new Chart(ctx, {

    type:'line',

    data:{
        labels:[],
        datasets:[{
            label:'압력값',
            data:[],
            borderColor:'red',
            borderWidth:3,
            tension:0.3
        }]
    },

    options:{
        responsive:true,
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }

});

/* 시뮬레이션 */

function startSimulation(){

    if(simulationRunning) return;

    simulationRunning = true;

    pressureValue = 50;

    sameTime = 0;

    let limit =
        parseInt(
            document.getElementById("timeLimit").value
        );

    const interval = setInterval(()=>{

        let current = new Date();

        let hour =
            current.getHours()
            .toString()
            .padStart(2,'0');

        let minute =
            current.getMinutes()
            .toString()
            .padStart(2,'0');

        let second =
            current.getSeconds()
            .toString()
            .padStart(2,'0');

        let timeLabel =
            hour + ":" + minute + ":" + second;

        pressureChart.data.labels.push(timeLabel);

        pressureChart.data.datasets[0]
            .data.push(pressureValue);

        pressureChart.update();

        sameTime++;

        if(sameTime >= limit){

            document.getElementById("warningBox")
                .style.display = "block";

            alert(
                "분실물 감지! 물건을 확인하세요."
            );

            clearInterval(interval);

            simulationRunning = false;

        }

    },1000);

}

</script>

</body>
</html>
